name: neuro_comet
description: >-
  NeuroComet - A safe, inclusive social platform designed for neurodivergent 
  individuals. Connect, share, and thrive in a sensory-friendly environment 
  with calming features, practice tools, and a supportive community.
publish_to: 'none'
version: 2.0.0+169

# App metadata
# homepage: https://getneurocomet.com
# repository: https://github.com/kyilmaz/neurocomet

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.1

  # Backend
  supabase_flutter: ^2.3.2

  # Data/Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI Components
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  photo_view: ^0.15.0
  file_picker: ^8.0.0

  # WebRTC Calling
  flutter_webrtc: ^0.12.4

  # Contacts
  flutter_contacts: ^1.1.9+2

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  connectivity_plus: ^7.0.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Icons
  flutter_vector_icons: ^2.0.0

  # Ads & Monetization
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.1.13

  # Analytics
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.6
  firebase_messaging: ^16.1.0

  # Accessibility
  flutter_tts: ^4.2.5

  # Typography
  google_fonts: ^8.0.1

  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.3.0

  # Google Drive Backup
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.1

  # Secure hashing
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^3.2.3
  json_serializable: ^6.11.0
  riverpod_generator: ^4.0.0+1

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.2
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts can be added later when the font files are available
  # fonts:
  #   - family: Lexend
  #     fonts:
  #       - asset: assets/fonts/Lexend-Regular.ttf
  #       - asset: assets/fonts/Lexend-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Lexend-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Lexend-Bold.ttf
  #         weight: 700
  #
  #   - family: OpenDyslexic
  #     fonts:
  #       - asset: assets/fonts/OpenDyslexic-Regular.otf
  #       - asset: assets/fonts/OpenDyslexic-Bold.otf
  #         weight: 700

